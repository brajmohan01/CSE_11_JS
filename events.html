<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events in JS</title>
</head>
<body onload="onLoad()">
    <button onclick="onClick()" >OnClick</button><br>
    <button onmouseover="onMouseOver()" >OnMouseOver</button><br>
    <button onmouseout="onMouseOut()" >OnMouseOut</button><br>
    <button onmouseup="onMouseUp()" >OnMouseUP</button><br>
    <button onmousedown="onMouseDown()" >OnMouseDown</button><br>
    <button onmousemove="onMouseMove()" >OnMouseMove</button><br>

    <input type="text" id="myInput">
    <script src="events.js"></script>
</body>
</html>
